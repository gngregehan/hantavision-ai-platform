databases:
  - name: hantavision-ai-db
    plan: free
    databaseName: hantavision
    user: hantavision
    postgresMajorVersion: '17'
    ipAllowList: []

services:
  - type: web
    name: hantavision-ai-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_BACKEND
        value: auto
      - key: DATABASE_URL
        fromDatabase:
          name: hantavision-ai-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_COLLECTION_PREFIX
        value: hantavision_
      - key: UPLOAD_DIR
        value: ./storage/uploads
      - key: MAX_UPLOAD_MB
        value: '12'
      - key: ACCESS_TOKEN_MINUTES
        value: '720'
      - key: CORS_ORIGINS
        value: https://hantavision-ai-frontend.onrender.com
      - key: ADMIN_EMAIL
        value: admin@hantavision.local
      - key: ADMIN_PASSWORD
        value: ChangeMe!2026

  - type: web
    name: hantavision-ai-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://hantavision-ai-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
