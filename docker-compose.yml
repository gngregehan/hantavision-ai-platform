services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hantavision
      POSTGRES_USER: hantavision
      POSTGRES_PASSWORD: hantavision
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:-replace-this-before-production}
      DATABASE_BACKEND: ${DATABASE_BACKEND:-auto}
      DATABASE_URL: postgresql+psycopg://hantavision:hantavision@db:5432/hantavision
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_COLLECTION_PREFIX: ${FIREBASE_COLLECTION_PREFIX:-hantavision_}
      UPLOAD_DIR: /app/storage/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080,http://127.0.0.1:5173
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@hantavision.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe!2026}
    volumes:
      - upload-data:/app/storage/uploads
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres-data:
  upload-data:
